steps:
  # Build and push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/clair-api', './api']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/clair-api']

  # Build and push AI image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/clair-ai', './ai']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/clair-ai']

  # Build and push UI image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/clair-ui', './ui']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/clair-ui']

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'clair-api'
      - '--image=gcr.io/$PROJECT_ID/clair-api'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=MONGO_URI=$_MONGO_URI,JWT_SECRET=$_JWT_SECRET,GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID,INTERNAL_API_KEY=$_INTERNAL_API_KEY'

  # Deploy AI to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'clair-ai'
      - '--image=gcr.io/$PROJECT_ID/clair-ai'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_API_KEY=$_GOOGLE_API_KEY,GOLANG_BACKEND_URL=$_GOLANG_BACKEND_URL,INTERNAL_API_KEY=$_INTERNAL_API_KEY'
      - '--memory=1Gi'
      - '--timeout=3600'

  # Deploy UI to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'clair-ui'
      - '--image=gcr.io/$PROJECT_ID/clair-ui'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'

substitutions:
  _REGION: us-central1

images:
  - 'gcr.io/$PROJECT_ID/clair-api'
  - 'gcr.io/$PROJECT_ID/clair-ai'
  - 'gcr.io/$PROJECT_ID/clair-ui'
