services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/clair_ai
      - PORT=3000
      - JWT_SECRET=clair-ai-dev-secret
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - AI_SERVICE_URL=http://ai:8001
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-clair-ai-dev-key}
    depends_on:
      - mongo

  ai:
    build: ./ai
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_GENAI_USE_VERTEXAI=FALSE
      - GOLANG_BACKEND_URL=http://api:3000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-clair-ai-dev-key}
      - AGENT_MODEL=${AGENT_MODEL:-gemini-2.5-flash-preview-native-audio-dialog}
      - PORT=8001

  ui:
    build: ./ui
    ports:
      - "8080:8080"
    depends_on:
      - api
      - ai

volumes:
  mongo_data:
